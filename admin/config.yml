backend:
  name: github
  repo: digital-ambernord-ch/decap-test-projekts
  branch: main
  base_url: https://ambernord-admin.pages.dev
  auth_endpoint: api/auth

media_folder: images
public_folder: /images

collections:
  - name: pages
    label: Pages
    folder: content
    create: true
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Body, name: body, widget: markdown}
